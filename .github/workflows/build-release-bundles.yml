name: Build Release Bundles

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "可选。填写 v0.1.0 这类版本号时创建/更新 GitHub Release；留空则只构建 Artifacts。"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.bundle_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            bundle_name: yingdraft-windows-x64
            binary_name: jy_cli.exe
            binary_path: target/release/jy_cli.exe
            rust_target: ""
          - runner: ubuntu-latest
            bundle_name: yingdraft-linux-x64
            binary_name: jy_cli
            binary_path: target/x86_64-unknown-linux-musl/release/jy_cli
            rust_target: x86_64-unknown-linux-musl
          - runner: macos-15-intel
            bundle_name: yingdraft-macos-x64
            binary_name: jy_cli
            binary_path: target/release/jy_cli
            rust_target: ""
          - runner: macos-15
            bundle_name: yingdraft-macos-arm64
            binary_name: jy_cli
            binary_path: target/release/jy_cli
            rust_target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux musl tools
        if: matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        shell: bash
        run: |
          if [[ -n "${{ matrix.rust_target }}" ]]; then
            cargo build -p jy_cli --release --target "${{ matrix.rust_target }}"
          else
            cargo build -p jy_cli --release
          fi

      - name: Prepare bundle
        shell: pwsh
        run: |
          # 统一生成发布目录结构，便于 Windows / Linux / macOS 采用相同的部署方式。
          $bundleRoot = Join-Path $PWD "dist/${{ matrix.bundle_name }}"
          $binDir = Join-Path $bundleRoot "bin"
          $scriptsDir = Join-Path $bundleRoot "scripts"
          $docsDir = Join-Path $bundleRoot "docs"
          $workDir = Join-Path $bundleRoot "work"
          $logsDir = Join-Path $bundleRoot "logs"

          New-Item -ItemType Directory -Force -Path $binDir, $scriptsDir, $docsDir, $workDir, $logsDir | Out-Null

          Copy-Item "${{ matrix.binary_path }}" (Join-Path $binDir "${{ matrix.binary_name }}") -Force
          Copy-Item "scripts/run-jy.ps1" (Join-Path $scriptsDir "run-jy.ps1") -Force
          Copy-Item "scripts/run-jy.sh" (Join-Path $scriptsDir "run-jy.sh") -Force
          Copy-Item "scripts/check-env.ps1" (Join-Path $scriptsDir "check-env.ps1") -Force
          Copy-Item "scripts/check-env.sh" (Join-Path $scriptsDir "check-env.sh") -Force
          Copy-Item "scripts/install-jy.ps1" (Join-Path $scriptsDir "install-jy.ps1") -Force
          Copy-Item "scripts/install-jy.sh" (Join-Path $scriptsDir "install-jy.sh") -Force
          Copy-Item "scripts/install.sh" (Join-Path $scriptsDir "install.sh") -Force
          Copy-Item "README.md" (Join-Path $bundleRoot "README.md") -Force
          Copy-Item "docs/使用文档.md" (Join-Path $docsDir "使用文档.md") -Force
          Copy-Item "docs/部署文档.md" (Join-Path $docsDir "部署文档.md") -Force
          Copy-Item "docs/Manifest规范.md" (Join-Path $docsDir "Manifest规范.md") -Force
          Copy-Item "docs/Bundle规范.md" (Join-Path $docsDir "Bundle规范.md") -Force

          @'
          将 ffprobe 放到当前 bin 目录后，再通过 scripts/run-jy.ps1 或 scripts/run-jy.sh 调用 CLI。
          建议保持目录结构不变：

          YingDraft/
            bin/
              jy_cli(.exe)
              ffprobe(.exe)
            scripts/
            docs/
            work/
            logs/
          '@ | Set-Content (Join-Path $binDir "README.txt") -Encoding UTF8

          if (-not $IsWindows) {
            chmod +x (Join-Path $binDir "${{ matrix.binary_name }}")
            chmod +x (Join-Path $scriptsDir "run-jy.sh")
            chmod +x (Join-Path $scriptsDir "check-env.sh")
            chmod +x (Join-Path $scriptsDir "install-jy.sh")
            chmod +x (Join-Path $scriptsDir "install.sh")
          }

      - name: Create archive
        shell: bash
        run: |
          cd dist
          tar -czf "${{ matrix.bundle_name }}.tar.gz" "${{ matrix.bundle_name }}"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle_name }}
          path: |
            dist/${{ matrix.bundle_name }}
            dist/${{ matrix.bundle_name }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '')
    permissions:
      contents: write
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.release_version }}"
          fi

          tag="$(echo "$tag" | xargs)"

          if [[ -z "$tag" ]]; then
            echo "release_version 为空，无法发布 Release。" >&2
            exit 1
          fi

          if [[ "$tag" != v* ]]; then
            echo "release_version 必须以 v 开头，例如 v0.1.0。" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-upload
          find release-assets -name "yingdraft-*.tar.gz" -type f -exec cp {} release-upload/ \;
          ls -lh release-upload
          count="$(find release-upload -name "yingdraft-*.tar.gz" -type f | wc -l | tr -d ' ')"
          if [[ "$count" -ne 4 ]]; then
            echo "预期 4 个发布包，实际找到 $count 个。" >&2
            exit 1
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          gh release upload "$RELEASE_TAG" release-upload/*.tar.gz --clobber
